    <script>
      // Instantly suppress benign Vite/HMR WebSocket connection errors before any bundle files load
      (function() {
        var isBenignError = function(msg) {
          if (!msg) return false;
          var s = String(msg).toLowerCase();
          return s.indexOf('websocket') !== -1 || s.indexOf('vite') !== -1 || s.indexOf('hmr') !== -1 || s.indexOf('ws') !== -1;
        };

        // Suppress benign logs from bubbling up to console panel
        var bindConsole = function(orig, filter) {
          return function() {
            var msg = Array.prototype.slice.call(arguments).map(function(arg) {
              try {
                return (arg && (arg.message || String(arg))) || '';
              } catch(e) {
                return '';
              }
            }).join(' ');
            if (filter(msg)) {
              return;
            }
            if (orig) {
              orig.apply(console, arguments);
            }
          };
        };
        if (typeof console !== 'undefined') {
          console.error = bindConsole(console.error, isBenignError);
          console.warn = bindConsole(console.warn, isBenignError);
          console.info = bindConsole(console.info, isBenignError);
        }

        // Global Event Handlers
        window.addEventListener('unhandledrejection', function(event) {
          var reason = event.reason;
          var msg = (reason && (reason.message || String(reason))) || '';
          if (isBenignError(msg)) {
            event.preventDefault();
            event.stopImmediatePropagation();
          }
        }, true);
        window.addEventListener('error', function(event) {
          var msg = event.message || '';
          if (isBenignError(msg) || (event.error && isBenignError(event.error.message))) {
            event.preventDefault();
            event.stopImmediatePropagation();
          }
        }, true);

        // Mock WebSocket constructor for Vite HMR to prevent error popups/unhandled warnings in sandbox environments
        if (typeof window !== 'undefined' && 'WebSocket' in window) {
          var OriginalWebSocket = window.WebSocket;
          var MockWebSocket = function(url, protocols) {
            var isViteHmr = typeof url === 'string' && (
              url.indexOf('vite') !== -1 || 
              url.indexOf('localhost') !== -1 || 
              url.indexOf('127.0.0.1') !== -1 || 
              url.indexOf('/@vite/client') !== -1
            );
            if (isViteHmr) {
              this.url = url;
              this.readyState = 3; // CLOSED
              this.bufferedAmount = 0;
              this.extensions = '';
              this.protocol = '';
              this.binaryType = 'blob';
              
              var listeners = {};
              this.addEventListener = function(type, listener) {
                if (!listeners[type]) listeners[type] = [];
                listeners[type].push(listener);
              };
              this.removeEventListener = function(type, listener) {
                if (!listeners[type]) return;
                var idx = listeners[type].indexOf(listener);
                if (idx !== -1) listeners[type].splice(idx, 1);
              };
              this.dispatchEvent = function(event) {
                var type = event.type;
                if (listeners[type]) {
                  listeners[type].forEach(function(ln) {
                    try { ln(event); } catch(e) {}
                  });
                }
                if (type === 'close' && typeof this.onclose === 'function') {
                  this.onclose(event);
                }
                if (type === 'error' && typeof this.onerror === 'function') {
                  this.onerror(event);
                }
                if (type === 'open' && typeof this.onopen === 'function') {
                  this.onopen(event);
                }
                if (type === 'message' && typeof this.onmessage === 'function') {
                  this.onmessage(event);
                }
                return true;
              }.bind(this);
              this.send = function(data) {};
              this.close = function(code, reason) {};

              // Fire close event cleanly on next tick
              var self = this;
              setTimeout(function() {
                var closeEvent = {
                  type: 'close',
                  code: 1000,
                  reason: 'Mocked clean close for Vite HMR sandbox bypass',
                  wasClean: true,
                  target: self
                };
                self.dispatchEvent(closeEvent);
              }, 0);
              return this;
            }
            return new OriginalWebSocket(url, protocols);
          };
          MockWebSocket.prototype = OriginalWebSocket.prototype;
          window.WebSocket = MockWebSocket;
        }
      })();
    </script>
